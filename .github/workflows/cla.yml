name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  cla:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'cla/signatures.json'
          path-to-document: 'https://github.com/zizetu/existential-identity-test-engine/blob/main/CONTRIBUTING.md#contributor-license-agreement'
          branch: 'cla-signatures'
          allowlist: zizetu,bot*
          remote-organization-name: zizetu
          remote-repository-name: existential-identity-test-engine
