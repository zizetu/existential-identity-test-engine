# Vigil Configuration — Guardian layer settings
# Default values match VigilConfig dataclass defaults in vigil_config.py

signal:
  interaction:
    sample_window_minutes: 30
    max_input_gap_minutes: 45
  physio:
    enabled: false
    source: none
    hrv_normal_range: [20.0, 100.0]
    hr_normal_range: [50.0, 100.0]
    spo2_threshold: 94.0

classifier:
  fatigue_work_hours: 4.0
  focus_max_hours: 2.0
  rest_max_hours: 8.0
  distress_no_signal_gap: 30

guardian:
  protect_states: [FOCUS, INSPIRATION, REST]
  patrol_interval_minutes: 5
  cooldown_default_minutes: 30
  emergency_contacts: []
  prompt_messages:
    fatigue: "You have been working for {hours} hours. Consider taking a break?"
    long_focus: "Deep focus for {hours} hours. Hydrate?"
    check_in: "Are you OK? Just checking in."
    emergency: "Abnormal state detected. Please confirm safety immediately."
